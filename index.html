<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weight Classification AI</title>

    <meta name="description" content="AI Powered Weight Classification">

    <meta name="theme-color" content="#2563eb">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background"></div>

    <main class="container">

        <header>

            <div class="logo">
                🧠
            </div>

            <h1>Weight Classification AI</h1>

            <p>
                Upload an image and let AI classify the animal.
            </p>

        </header>

        <!-- Upload Card -->

        <section class="glass">

            <label id="dropArea">

                <input
                    type="file"
                    id="imageInput"
                    accept="image/png,image/jpeg,image/webp"
                    hidden>

                <div class="uploadIcon">

                    📤

                </div>

                <h2>

                    Drag & Drop Image

                </h2>

                <p>

                    or click anywhere here to browse

                </p>

            </label>

        </section>

        <!-- Preview -->

        <section
            class="glass hidden"
            id="previewSection">

            <img
                id="previewImage"
                alt="Preview">

            <div class="previewInfo">

                <h2 id="fileName">

                </h2>

                <p id="imageSize">

                </p>

                <button
                    id="removeBtn">

                    Remove Image

                </button>

            </div>

        </section>

        <!-- Loading -->

        <section
            class="glass hidden"
            id="loadingSection">

            <div class="spinner"></div>

            <h2>

                AI is analyzing your image...

            </h2>

            <p
                id="loadingText">

                Uploading...

            </p>

            <div class="progress">

                <div
                    id="progressBar">

                </div>

            </div>

        </section>

        <!-- Results -->

        <section
            class="glass hidden"
            id="resultSection">

            <h2>

                Prediction

            </h2>

            <div class="predictionCard">

                <div>

                    <div class="label">

                        Predicted Class

                    </div>

                    <div id="prediction">

                        -

                    </div>

                </div>

                <div>

                    <div class="label">

                        Confidence

                    </div>

                    <div id="confidence">

                        -

                    </div>

                </div>

            </div>

            <div
                id="confidenceContainer">

            </div>

            <div class="buttons">

                <button id="copyBtn">

                    📋 Copy Result

                </button>

                <button id="downloadBtn">

                    💾 Download JSON

                </button>

                <button id="newBtn">

                    🔄 Analyze Another

                </button>

            </div>

        </section>

        <!-- Error -->

        <section
            class="glass hidden"
            id="errorSection">

            <h2>

                ⚠️ Error

            </h2>

            <p id="errorMessage">

            </p>

            <button id="retryBtn">

                Retry

            </button>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
