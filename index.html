<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Classifier</title>

    <link rel="stylesheet" href="style.css">

    <script type="module" src="script.js"></script>
</head>
<body>

<div class="container">

    <h1>🌿 Plant Disease Classifier</h1>
    <p>Upload a leaf image for instant disease prediction.</p>

    <div class="upload-box" id="dropArea">

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            hidden>

        <img id="preview" hidden>

        <p id="uploadText">
            Drag & Drop an image here
            <br>
            or
        </p>

        <button id="chooseBtn">
            Choose Image
        </button>

    </div>

    <button id="predictBtn">
        Predict
    </button>

    <div id="loading" hidden>

        <div class="spinner"></div>

        <p>Predicting...</p>

    </div>

    <div id="results" hidden>

        <h2>Prediction</h2>

        <h3 id="prediction"></h3>

        <p id="confidence"></p>

        <div id="topPredictions"></div>

    </div>

</div>

</body>
</html>
