<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Model Predictor</title>
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
  </head>
  <body>
    <header>
        <h1>Weight Model Predictor</h1>
        <p>API hosted by <a href="https://huggingface.co" target="_blank">Hugging Face</a></p>
    </header>
    <main>
        <header>
            <h2>Submit a picture for classification</h2>
            <!-- Containers to show results -->
            <p id="prediction" style="font-weight: bold; color: #007bff;"></p>
            <p id="confidences"></p>
            <p id="status_msg" style="color: #666;"></p>
        </header>
        <section>
            <img id="myImage" height="400" width="400" style="display:none; object-fit: contain; margin-bottom: 20px;">
            <form id="form">
                <label for="fileInput">Choose Image File:</label>
                <input id="fileInput" type="file" onchange="onFileSelected(event)" name="File">
            </form>
        </section>
    </main>
    <!-- Change index.js to app.js to match your filename structure -->
    <script src="app.js"></script>
  </body>
</html>
